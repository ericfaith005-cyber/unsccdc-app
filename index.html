<!DOCTYPE html>
<html>
<head>
  <!-- 💎 THE IMPERIAL PATH: Matches your repo 'unsccdc-app' exactly -->
  <base href="/unsccdc-app/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="UNSCCDC National Hub - Central Control">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="UNSCCDC Hub">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <title>UNSCCDC National Hub</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* 🎨 PRESTIGE BOOT SCREEN */
    body { 
      background-color: #000000; 
      display: flex; 
      flex-direction: column;
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      margin: 0; 
      color: #D4AF37;
      font-family: 'Courier New', monospace;
    }
    .loader { 
      border: 4px solid #111; 
      border-top: 4px solid #D4AF37; 
      border-radius: 50%; 
      width: 60px; 
      height: 60px; 
      animation: spin 1s linear infinite; 
      margin-bottom: 25px;
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .status-text { letter-spacing: 4px; font-weight: 900; font-size: 10px; text-transform: uppercase; }
  </style>
</head>
<body>
  <!-- 🏛️ THE Hub VISUAL BOOT SEQUENCE -->
  <div class="loader"></div>
  <div class="status-text">Synchronizing National Link...</div>

  <script src="flutter.js" defer></script>
  <script>
    window.addEventListener('load', function(ev) {
      // 🛡️ THE GHOST KILLER: Unregister old/broken versions from the browser cache
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
          }
        });
      }

      // 🚀 THE IMPERIAL ENGINE LOAD
      _flutter.loader.loadEntrypoint({
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine({
            // 💎 FORCE HTML RENDERER: Crucial for speed and bypassing CORS glitches on Web
            useHtml: true 
          }).then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
