<!DOCTYPE html>
<html>
<head>
  <!-- 💎 THE MASTER PATH: Matches your repo name exactly -->
  <base href="/unsccdc-app/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="UNSCCDC National Hub">

  <title>UNSCCDC National Hub</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* 🎨 IMPERIAL BOOT SCREEN */
    body { 
      background-color: #000000; 
      display: flex; 
      flex-direction: column;
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      margin: 0; 
      color: #D4AF37;
      font-family: 'Courier New', monospace;
    }
    .loader { 
      border: 5px solid #111; 
      border-top: 5px solid #D4AF37; 
      border-radius: 50%; 
      width: 50px; 
      height: 50px; 
      animation: spin 1s linear infinite; 
      margin-bottom: 20px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader"></div>
  <div style="letter-spacing: 3px; font-weight: bold; font-size: 12px;">WAKING UP THE HUB...</div>

  <script src="flutter.js" defer></script>
  <script>
    window.addEventListener('load', function(ev) {
      // 🛡️ THE GHOST KILLER: Unregister old broken service workers
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          for(let reg of regs) reg.unregister();
        });
      }
      // 🚀 THE IMPERIAL LOAD
      _flutter.loader.loadEntrypoint({
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine({
            useHtml: true // 💎 Forces fast loading on all networks
          }).then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
